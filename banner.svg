<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280">
  <defs>
    <radialGradient id="glow" cx="28%" cy="62%" r="55%">
      <stop offset="0%" stop-color="#8fe05e" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0e0e0e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#2d5016" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0e0e0e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" fill="#0e0e0e"/>
  <rect width="1200" height="280" fill="url(#glow)"/>
  <rect width="1200" height="280" fill="url(#glow2)"/>

  <!-- Top rule -->
  <line x1="0" y1="0" x2="1200" y2="0" stroke="#8fe05e" stroke-width="2"/>

  <!-- Label -->
  <text x="64" y="72" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" letter-spacing="3" fill="rgba(143,224,94,0.72)" text-transform="uppercase">FORMIA · v1.0 · 2026</text>

  <!-- Ghost letter -->
  <text x="-12" y="310" font-family="Georgia, serif" font-size="340" font-weight="900" fill="rgba(255,255,255,0.022)" letter-spacing="-0.06em">F</text>

  <!-- Main display headline -->
  <text x="62" y="178" font-family="Georgia, 'Times New Roman', serif" font-size="108" font-weight="900" letter-spacing="-0.045em" fill="#f0ede8">Build</text>
  <text x="362" y="178" font-family="Georgia, 'Times New Roman', serif" font-size="108" font-style="italic" font-weight="300" letter-spacing="-0.03em" fill="rgba(240,237,232,0.38)"> differ</text>
  <text x="750" y="178" font-family="Georgia, 'Times New Roman', serif" font-size="108" font-weight="900" letter-spacing="-0.045em" fill="#8fe05e">ently.</text>

  <!-- Tagline -->
  <text x="64" y="228" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13.5" letter-spacing="0.04em" fill="rgba(240,237,232,0.42)">One file. Design engine + motion layer. 11 themes. No build step.</text>

  <!-- Right block: stats -->
  <text x="1136" y="110" font-family="Georgia, serif" font-size="36" font-weight="900" fill="#8fe05e" text-anchor="end">11</text>
  <text x="1136" y="128" font-family="'JetBrains Mono', monospace" font-size="9.5" letter-spacing="0.14em" fill="rgba(240,237,232,0.32)" text-anchor="end">THEMES</text>

  <line x1="980" y1="148" x2="1136" y2="148" stroke="rgba(240,237,232,0.08)" stroke-width="1"/>

  <text x="1136" y="172" font-family="Georgia, serif" font-size="36" font-weight="900" fill="#8fe05e" text-anchor="end">0</text>
  <text x="1136" y="190" font-family="'JetBrains Mono', monospace" font-size="9.5" letter-spacing="0.14em" fill="rgba(240,237,232,0.32)" text-anchor="end">DEPENDENCIES</text>

  <line x1="980" y1="210" x2="1136" y2="210" stroke="rgba(240,237,232,0.08)" stroke-width="1"/>

  <text x="1136" y="234" font-family="Georgia, serif" font-size="36" font-weight="900" fill="#8fe05e" text-anchor="end">~15<tspan font-size="18" font-weight="400">KB</tspan></text>
  <text x="1136" y="252" font-family="'JetBrains Mono', monospace" font-size="9.5" letter-spacing="0.14em" fill="rgba(240,237,232,0.32)" text-anchor="end">MINIFIED</text>

  <!-- Bottom rule -->
  <line x1="0" y1="279" x2="1200" y2="279" stroke="rgba(240,237,232,0.08)" stroke-width="1"/>
  <line x1="0" y1="279" x2="320" y2="279" stroke="#8fe05e" stroke-width="1" stroke-opacity="0.4"/>
</svg>
